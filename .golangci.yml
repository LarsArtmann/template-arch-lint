version: "2"
run:
    timeout: 5m
    go: 1.26.2
    build-tags:
        - goexperiment.arenas
        - goexperiment.goroutineleakprofile
        - goexperiment.jsonv2
        - goexperiment.runtimesecret
        - goexperiment.simd
    modules-download-mode: readonly
    allow-parallel-runners: true
    allow-serial-runners: true
    issues-exit-code: 1
    tests: true
output:
    formats: {}
linters:
    enable:
        - arangolint
        - asasalint
        - asciicheck
        - bidichk
        - bodyclose
        - canonicalheader
        - containedctx
        - contextcheck
        - copyloopvar
        - cyclop
        - decorder
        - depguard
        - dogsled
        - dupl
        - dupword
        - durationcheck
        - embeddedstructfieldcheck
        - err113
        - errcheck
        - errchkjson
        - errname
        - errorlint
        - exhaustive
        - exhaustruct
        - exptostd
        - fatcontext
        - forbidigo
        - forcetypeassert
        - funlen
        - ginkgolinter
        - gocheckcompilerdirectives
        - gochecknoglobals
        - gochecknoinits
        - gochecksumtype
        - gocognit
        - goconst
        - gocritic
        - gocyclo
        - godoclint
        - godot
        - godox
        - goheader
        - gomoddirectives
        - gomodguard
        - goprintffuncname
        - gosec
        - gosmopolitan
        - govet
        - grouper
        - iface
        - importas
        - inamedparam
        - ineffassign
        - interfacebloat
        - intrange
        - iotamixing
        - ireturn
        - loggercheck
        - maintidx
        - makezero
        - mirror
        - misspell
        - mnd
        - modernize
        - musttag
        - nakedret
        - nestif
        - nilerr
        - nilnesserr
        - nilnil
        - nlreturn
        - noctx
        - noinlineerr
        - nolintlint
        - nonamedreturns
        - nosprintfhostport
        - paralleltest
        - perfsprint
        - prealloc
        - predeclared
        - promlinter
        - protogetter
        - reassign
        - recvcheck
        - revive
        - rowserrcheck
        - sloglint
        - spancheck
        - sqlclosecheck
        - staticcheck
        - tagalign
        - tagliatelle
        - testableexamples
        - testifylint
        - testpackage
        - thelper
        - tparallel
        - unconvert
        - unparam
        - unqueryvet
        - unused
        - usestdlibvars
        - usetesting
        - varnamelen
        - wastedassign
        - whitespace
        - wrapcheck
        - wsl_v5
        - zerologlint
    disable:
        - funcorder
    settings:
        depguard:
            rules:
                Main:
                    allow:
                        - $gostd
                        - github.com/LarsArtmann/template-arch-lint
                        - github.com/charmbracelet/log
                        - github.com/gin-gonic/gin
                        - github.com/go-playground/validator/v10
                        - github.com/spf13/viper
                        - github.com/samber/lo
                        - github.com/samber/mo
                        - github.com/larsartmann/go-composable-business-types
                        - github.com/onsi/ginkgo/v2
                        - github.com/onsi/gomega
                    files:
                        - $all
                        - '!$test'
                    list-mode: lax
                Test:
                    allow:
                        - $gostd
                        - github.com/LarsArtmann/template-arch-lint
                        - github.com/onsi/ginkgo/v2
                        - github.com/onsi/gomega
                        - github.com/samber/lo
                        - github.com/samber/mo
                        - github.com/stretchr/testify
                    files:
                        - $test
                    list-mode: lax
formatters:
    enable:
        - gci
        - goimports
        - gofumpt
        - golines
issues: {}
